<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QC Checkout — Bazaar Print</title>
  <script src="shared.js?v=20260427-PRI240"></script>
  <script src="pulse-config.local.js"></script>
  <script src="pulse-health-check.js"></script>
  <script src="supabase-client.js?v=20260427-PRI240"></script>
  <script src="auth.js?v=20260427-PRI240"></script>
  <style id="page-styles"></style>
</head>
<body>
<div id="nav"></div>
<div id="breadcrumb"></div>

<!-- Three-column QC layout -->
<div class="qc-layout">

  <!-- LEFT PANEL: Needs QC -->
  <div class="qc-panel qc-panel-left">
    <div class="panel-header">
      <div class="panel-title">📋 Needs QC</div>
      <div class="panel-subtitle" id="leftCount">0 jobs</div>
    </div>
    <div class="panel-search">
      <input type="text" id="qcSearchLeft" placeholder="Search order or customer…" oninput="renderLeftPanel()">
    </div>
    <div class="panel-list" id="leftJobList">
      <div class="panel-empty">Loading…</div>
    </div>
  </div>

  <!-- CENTER PANEL: QC Window -->
  <div class="qc-panel qc-panel-center">
    <div class="center-header">
      <h2 class="center-title">🔍 Quality Control Checkout</h2>
    </div>

    <!-- Placeholder when no order selected -->
    <div id="qcPlaceholder" class="qc-placeholder">
      <div class="placeholder-icon">🔍</div>
      <div class="placeholder-text">Select a job from the left panel to begin QC</div>
      <div class="placeholder-sub">Jobs in <strong>QC Queue</strong> are shown on the left</div>
    </div>

    <!-- QC Form (shown after selecting an order) -->
    <div id="qcFormSection" style="display:none;">
      <!-- Scrollable content: banner + checklist + assessment all scroll together -->
      <div class="qc-form-scroll">
        <div class="card qc-order-banner" id="orderBanner"></div>

        <div class="card qc-checklist-card">
          <h3 class="section-title">✅ QC Checklist</h3>
          <div class="checklist" id="checklist"></div>
        </div>

        <!-- Observations & Verdict -->
        <div class="card" style="margin-bottom:0;">
          <h3 class="section-title">📋 QC Assessment</h3>
          <div class="form-row-2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="field">
              <label>QC Verdict *</label>
              <div class="verdict-buttons">
                <button class="verdict-btn verdict-pass" id="verdictPass" onclick="setVerdict('pass')">✅ PASS</button>
                <button class="verdict-btn verdict-fail" id="verdictFail" onclick="setVerdict('fail')">❌ FAIL</button>
              </div>
            </div>
            <div class="field">
              <label>QC Inspector Name *</label>
              <input type="text" id="qcInspector" placeholder="Your name">
            </div>
          </div>
          <div class="field" style="margin-top:12px;">
            <label>QC Notes</label>
            <textarea id="qcNotes" rows="2" placeholder="Any observations, issues, or comments…"></textarea>
          </div>

          <!-- Fail Options -->
          <div id="failOptions" style="display:none;margin-top:12px;padding:12px;background:#fff5f5;border:1px solid #fecaca;border-radius:8px;">
            <h4 style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:10px;">❌ QC Failed — Required Actions</h4>
            <div class="field" style="margin-bottom:10px;">
              <label>Failure Reason(s)</label>
              <div class="fail-reasons">
                <label class="cb-row"><input type="checkbox" value="version-wrong"> Wrong version / incorrect artwork</label>
                <label class="cb-row"><input type="checkbox" value="print-quality"> Print quality issue (banding, smear, color off)</label>
                <label class="cb-row"><input type="checkbox" value="color-accuracy"> Color accuracy fail (out of spec)</label>
                <label class="cb-row"><input type="checkbox" value="quantity-short"> Quantity short</label>
                <label class="cb-row"><input type="checkbox" value="finishing-issue"> Finishing defect (lamination, UV, foil)</label>
                <label class="cb-row"><input type="checkbox" value="cutting-off"> Cutting/die accuracy off</label>
                <label class="cb-row"><input type="checkbox" value="damage"> Physical damage</label>
                <label class="cb-row"><input type="checkbox" value="other-fail"> Other</label>
              </div>
            </div>
            <div class="field" style="margin-bottom:10px;">
              <label>Create Reprint / Shortage Ticket?</label>
              <label class="cb-row"><input type="checkbox" id="createReprintCheck" onchange="toggleReprintQty()"> Yes — create reprint ticket</label>
            </div>
            <div id="reprintQtySection" style="display:none;">
              <div class="field">
                <label>Reprint Quantity</label>
                <input type="number" id="reprintQtyInput" min="1" placeholder="e.g. 500">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Submit bar — flex-shrink:0 child of #qcFormSection, always visible regardless of scroll -->
      <div class="save-bar">
        <button class="btn" onclick="clearQCForm()">Cancel / Clear</button>
        <button class="btn btn-primary" id="submitQCBtn" onclick="submitQC()">Submit QC Result</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: Done / Failed -->
  <div class="qc-panel qc-panel-right">
    <div class="panel-header">
      <div class="panel-title">📜 QC Activity</div>
      <div class="panel-subtitle" id="rightCount">—</div>
    </div>
    <div class="right-filter-row">
      <button class="rf-btn selected" id="rfAll" onclick="setRightFilter('all')">All</button>
      <button class="rf-btn" id="rfPass" onclick="setRightFilter('pass')">✅ Passed</button>
      <button class="rf-btn" id="rfFail" onclick="setRightFilter('fail')">❌ Failed</button>
    </div>
    <div class="panel-list" id="rightJobList">
      <div class="panel-empty">No QC records yet.</div>
    </div>
  </div>

</div>

<script>
injectThemeCSS();
document.getElementById('nav').innerHTML = renderNav('qc-checkout');
document.getElementById('breadcrumb').innerHTML = renderBreadcrumb([{ label: 'QC Checkout' }]);
initAuth('qc-checkout');

document.getElementById('page-styles').textContent = `
  html, body { height: 100%; }
  body { overflow: hidden; display: flex; flex-direction: column; }

  /* ── Three-panel grid ── */
  .qc-layout {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    grid-template-rows: minmax(0, 1fr);
    flex: 1;
    min-height: 0;
    gap: 0;
    overflow: hidden;
  }

  /* ── Shared panel styles ── */
  .qc-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 12px 6px;
    background: var(--card);
  }
  .qc-panel-center { margin: 12px; }

  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .panel-title { font-size: 14px; font-weight: 700; }
  .panel-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .panel-search { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-search input { width: 100%; box-sizing: border-box; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); }

  .panel-list { flex: 1; overflow-y: auto; padding: 8px; }
  .panel-empty { font-size: 13px; color: var(--text-muted); padding: 16px; text-align: center; }

  /* ── Left panel job cards ── */
  .qj-card {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--card);
  }
  .qj-card:hover { border-color: var(--accent); background: #e0edff; }
  .qj-card.active { border-color: var(--accent); background: #dbeafe; }
  .qj-id { font-weight: 700; color: var(--accent); font-size: 13px; }
  .qj-customer { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .qj-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* ── Center panel ── */
  .center-header {
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .center-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }

  .qc-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    color: var(--text-muted);
  }
  .placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .placeholder-text { font-size: 16px; font-weight: 600; color: var(--text); }
  .placeholder-sub { font-size: 13px; margin-top: 8px; }

  #qcFormSection {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 20px 0;
  }
  .qc-form-scroll {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-bottom: 4px;
  }

  .section-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .qc-order-banner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; background: #e0edff; border-color: #bfdbfe; }
  .banner-id { font-size: 18px; font-weight: 800; color: var(--accent); }
  .banner-customer { font-size: 16px; font-weight: 700; }
  .banner-details { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  .qc-checklist-card { margin-bottom: 16px; }
  .checklist { display: flex; flex-direction: column; gap: 0; }
  .checklist-item { display: flex; align-items: flex-start; gap: 16px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .checklist-item:last-child { border-bottom: none; }
  .ci-left { flex: 1; }
  .ci-label { font-weight: 600; font-size: 14px; }
  .ci-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .ci-verdict { display: flex; gap: 8px; }
  .ci-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; background: var(--card); transition: all 0.15s; }
  .ci-btn:hover { opacity: 0.9; }
  .ci-btn.ci-pass.selected { background: var(--green); color: white; border-color: var(--green); }
  .ci-btn.ci-fail.selected { background: var(--red); color: white; border-color: var(--red); }
  .ci-btn.ci-na.selected { background: var(--text-muted); color: white; border-color: var(--text-muted); }

  .verdict-buttons { display: flex; gap: 10px; margin-top: 8px; }
  .verdict-btn { flex: 1; padding: 16px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.15s; background: var(--card); }
  .verdict-pass.selected { background: var(--green); color: white; border-color: var(--green); }
  .verdict-fail.selected { background: var(--red); color: white; border-color: var(--red); }
  .fail-reasons { display: flex; flex-direction: column; gap: 6px; }
  .cb-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .cb-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }
  .save-bar { flex-shrink: 0; display: flex; justify-content: flex-end; gap: 10px; padding: 10px 0 12px; border-top: 1px solid var(--border); margin-top: 4px; }
  .field { display: flex; flex-direction: column; }

  /* ── Right panel ── */
  .right-filter-row {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rf-btn {
    flex: 1;
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--card);
    transition: all 0.15s;
  }
  .rf-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

  .rj-card {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    font-size: 12px;
    background: var(--card);
  }
  .rj-header { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13px; margin-bottom: 3px; }
  .rj-meta { font-size: 11px; color: var(--text-muted); }
  .rj-msg { font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
`;

const QC_CHECKLIST_ITEMS = [
  { id: 'version', label: 'Version / Artwork Correct', desc: 'The correct artwork file was printed — no wrong version, old file, or missing design elements.' },
  { id: 'print-quality', label: 'Print Quality', desc: 'No banding, ink smear, streaks, or missing colors. Sharp registration.' },
  { id: 'color-accuracy', label: 'Color Accuracy', desc: 'Colors match the approved proof or reference. Pantone/CMYK values within tolerance.' },
  { id: 'quantity', label: 'Quantity Count', desc: 'Final count matches the ordered quantity (within acceptable overrun/underrun).' },
  { id: 'finishing', label: 'Finishing Quality', desc: 'Lamination uniform, no bubbles or peeling. UV/foil applied correctly. No delamination.' },
  { id: 'cutting', label: 'Cutting / Die Accuracy', desc: 'Cut lines accurate, die aligned correctly. No overcut or undercut. Clean edges.' },
];

let selectedOrderDbId = null;
let selectedOrder = null;
let currentVerdict = null;
let checklistResults = {};
let rightFilter = 'all';

// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  renderChecklist();
  await Promise.all([renderLeftPanel(), loadRightPanel()]);

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order');
  if (orderId) {
    const order = await getOrderByOrderId(orderId);
    if (order) selectOrder(order);
  }

  onDBUpdate(async (data) => {
    if (data.store === 'orders' || data.store === 'activity_log') {
      await Promise.all([renderLeftPanel(), loadRightPanel()]);
    }
  });
});

// ── Left panel ────────────────────────────────────────────
async function renderLeftPanel() {
  const q = (document.getElementById('qcSearchLeft')?.value || '').trim().toLowerCase();
  const allOrders = await getAllOrders();
  let jobs = allOrders.filter(o => o.status === 'qc-checkout');

  if (q) {
    jobs = jobs.filter(o => {
      const hay = [o.orderId, o.customer || o.customerName, o.productType, o.jobDescription].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  const countEl = document.getElementById('leftCount');
  if (countEl) countEl.textContent = `${jobs.length} job${jobs.length !== 1 ? 's' : ''}`;

  const list = document.getElementById('leftJobList');
  if (!jobs.length) {
    list.innerHTML = '<div class="panel-empty">No jobs in QC queue</div>';
    return;
  }

  list.innerHTML = jobs.map(o => {
    const isActive = selectedOrder && selectedOrder.id === o.id;
    const due = o.dueDate ? formatDate(o.dueDate) : '';
    const overdue = o.dueDate && new Date(o.dueDate) < new Date() ? ' style="color:var(--red)"' : '';
    return `<div class="qj-card${isActive ? ' active' : ''}" onclick="selectOrder(${JSON.stringify(o).replace(/"/g, '&quot;')})">
      <div class="qj-id">#${o.orderId}</div>
      <div class="qj-customer">${o.customerName || o.customer || '—'}</div>
      <div class="qj-meta">${o.productType || ''}${due ? ` · <span${overdue}>Due ${due}</span>` : ''}</div>
    </div>`;
  }).join('');
}

// ── Right panel ───────────────────────────────────────────
async function loadRightPanel() {
  const all = await getAllActivity();
  let logs = all
    .filter(a => a.type === 'qc-pass' || a.type === 'qc-fail')
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
    .slice(0, 40);

  if (rightFilter === 'pass') logs = logs.filter(l => l.type === 'qc-pass');
  if (rightFilter === 'fail') logs = logs.filter(l => l.type === 'qc-fail');

  const countEl = document.getElementById('rightCount');
  if (countEl) countEl.textContent = `${logs.length} record${logs.length !== 1 ? 's' : ''}`;

  const list = document.getElementById('rightJobList');
  if (!logs.length) {
    list.innerHTML = '<div class="panel-empty">No QC records yet.</div>';
    return;
  }

  list.innerHTML = logs.map(log => {
    const icon = log.type === 'qc-pass' ? '✅' : '❌';
    const label = log.type === 'qc-pass' ? 'PASSED' : 'FAILED';
    return `<div class="rj-card">
      <div class="rj-header">${icon} <span>#${log.orderId}</span> <span style="font-size:11px;font-weight:600;color:${log.type === 'qc-pass' ? 'var(--green)' : 'var(--red)'}">${label}</span></div>
      <div class="rj-meta">${formatDateTime(log.timestamp)} · ${log.by || '—'}</div>
      <div class="rj-msg">${log.message || ''}</div>
    </div>`;
  }).join('');
}

function setRightFilter(f) {
  rightFilter = f;
  ['all','pass','fail'].forEach(k => {
    const el = document.getElementById(`rf${k.charAt(0).toUpperCase()}${k.slice(1)}`);
    if (el) el.classList.toggle('selected', k === f);
  });
  loadRightPanel();
}

// ── Select Order ──────────────────────────────────────────
async function selectOrder(orderOrId) {
  if (typeof orderOrId === 'number') {
    const all = await getAllOrders();
    selectedOrder = all.find(o => o.id === orderOrId);
  } else {
    selectedOrder = orderOrId;
  }
  if (!selectedOrder) return;
  selectedOrderDbId = selectedOrder.id;

  document.getElementById('qcPlaceholder').style.display = 'none';
  document.getElementById('qcFormSection').style.display = 'flex';

  const dueClass = selectedOrder.dueDate && new Date(selectedOrder.dueDate) < new Date() ? 'color:var(--red)' : '';
  const priorFailBanner = selectedOrder.status === 'qc-failed'
    ? `<div style="background:#fde8e8;border:1.5px solid #dc2626;border-radius:8px;padding:10px 12px;margin-top:10px;">
        <strong style="color:#7f1d1d;">⚠️ Previously Failed QC</strong>
        <div style="font-size:12px;color:#7f1d1d;margin-top:3px;">
          This order failed QC${selectedOrder.qcFailedAt ? ` on ${formatDate(selectedOrder.qcFailedAt)}` : ''}.
          Only submit PASS if defects have been physically corrected and re-inspected.
        </div>
      </div>`
    : '';
  document.getElementById('orderBanner').innerHTML = `
    <div class="banner-info">
      <div class="banner-id">#${selectedOrder.orderId}</div>
      <div class="banner-customer">${selectedOrder.customerName}</div>
      <div class="banner-details">${selectedOrder.productType || ''} · ${selectedOrder.material || ''} · Qty: ${(selectedOrder.quantity || 0).toLocaleString()} units</div>
      ${selectedOrder.dueDate ? `<div style="font-size:12px;${dueClass}">Due: ${formatDate(selectedOrder.dueDate)}</div>` : ''}
      ${selectedOrder.specialNotes ? `<div style="font-size:12px;color:var(--text);margin-top:4px;">Notes: ${selectedOrder.specialNotes}</div>` : ''}
      ${priorFailBanner}
    </div>
    <div>
      ${renderStatusBadge(selectedOrder.status)}
      <div style="margin-top:8px;">
        <button class="btn btn-sm" onclick="clearQCForm()">Change Order</button>
      </div>
    </div>
  `;

  checklistResults = {};
  currentVerdict = null;
  document.getElementById('verdictPass').classList.remove('selected');
  document.getElementById('verdictFail').classList.remove('selected');
  document.getElementById('qcNotes').value = '';
  document.getElementById('qcInspector').value = '';
  document.getElementById('failOptions').style.display = 'none';
  document.getElementById('createReprintCheck').checked = false;
  document.getElementById('reprintQtySection').style.display = 'none';
  document.querySelectorAll('.fail-reasons input[type=checkbox]').forEach(cb => cb.checked = false);
  resetChecklistUI();

  // Highlight active card in left panel
  renderLeftPanel();
}

// ── Checklist ─────────────────────────────────────────────
function renderChecklist() {
  const container = document.getElementById('checklist');
  container.innerHTML = QC_CHECKLIST_ITEMS.map(item => `
    <div class="checklist-item" id="ci-${item.id}">
      <div class="ci-left">
        <div class="ci-label">${item.label}</div>
        <div class="ci-desc">${item.desc}</div>
        <div class="ci-notes" style="margin-top:6px;display:none;" id="ci-notes-${item.id}">
          <input type="text" placeholder="Notes for this item…" id="ci-note-${item.id}">
        </div>
      </div>
      <div class="ci-verdict">
        <button class="ci-btn ci-pass" id="ci-pass-${item.id}" onclick="setCheckItem('${item.id}','pass')">✅ Pass</button>
        <button class="ci-btn ci-fail" id="ci-fail-${item.id}" onclick="setCheckItem('${item.id}','fail')">❌ Fail</button>
        <button class="ci-btn ci-na" id="ci-na-${item.id}" onclick="setCheckItem('${item.id}','na')">N/A</button>
      </div>
    </div>
  `).join('');
}

function resetChecklistUI() {
  QC_CHECKLIST_ITEMS.forEach(item => {
    ['pass', 'fail', 'na'].forEach(v => document.getElementById(`ci-${v}-${item.id}`)?.classList.remove('selected'));
    document.getElementById(`ci-notes-${item.id}`).style.display = 'none';
  });
}

function setCheckItem(itemId, verdict) {
  checklistResults[itemId] = verdict;
  ['pass', 'fail', 'na'].forEach(v => {
    const btn = document.getElementById(`ci-${v}-${itemId}`);
    if (btn) btn.classList.toggle('selected', v === verdict);
  });
  const notesRow = document.getElementById(`ci-notes-${itemId}`);
  if (notesRow) notesRow.style.display = verdict === 'fail' ? 'block' : 'none';

  const hasAnyFail = Object.values(checklistResults).some(v => v === 'fail');
  const allChecked = QC_CHECKLIST_ITEMS.every(item => checklistResults[item.id]);
  if (hasAnyFail) setVerdict('fail');
  else if (allChecked) setVerdict('pass');
}

function setVerdict(v) {
  currentVerdict = v;
  document.getElementById('verdictPass').classList.toggle('selected', v === 'pass');
  document.getElementById('verdictFail').classList.toggle('selected', v === 'fail');
  document.getElementById('failOptions').style.display = v === 'fail' ? 'block' : 'none';
}

function toggleReprintQty() {
  const checked = document.getElementById('createReprintCheck').checked;
  document.getElementById('reprintQtySection').style.display = checked ? 'block' : 'none';
}

// ── Submit QC ─────────────────────────────────────────────
async function submitQC() {
  if (!selectedOrder) { showPageToast('Please select an order first.', 'warning'); return; }
  if (!currentVerdict) { showPageToast('Please set a QC verdict (Pass or Fail).', 'warning'); return; }
  const inspector = document.getElementById('qcInspector').value.trim();
  if (!inspector) { showPageToast('Please enter your name as QC Inspector.', 'warning'); return; }

  const btn = document.getElementById('submitQCBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const notes = document.getElementById('qcNotes').value.trim();

    const checklistData = QC_CHECKLIST_ITEMS.map(item => ({
      id: item.id,
      label: item.label,
      verdict: checklistResults[item.id] || 'not-checked',
      notes: document.getElementById(`ci-note-${item.id}`)?.value || ''
    }));

    const failReasons = currentVerdict === 'fail'
      ? Array.from(document.querySelectorAll('.fail-reasons input[type=checkbox]:checked')).map(cb => cb.value)
      : [];

    const qcRecord = {
      orderId: selectedOrder.orderId,
      verdict: currentVerdict,
      inspector,
      notes,
      checklist: checklistData,
      failReasons,
      timestamp: new Date().toISOString()
    };

    if (currentVerdict === 'pass' && selectedOrder.status === 'qc-failed') {
      const confirmed = confirm(
        `⚠️ This order previously FAILED QC.\n\n` +
        `Only mark PASS if all defects have been physically corrected and re-inspected.\n\n` +
        `Confirm: defects have been resolved and the product is ready to ship?`
      );
      if (!confirmed) {
        btn.disabled = false;
        btn.textContent = 'Submit QC Result';
        return;
      }
    }

    if (currentVerdict === 'pass') {
      await updateOrder(selectedOrderDbId, {
        status: 'ready-to-ship',
        qcStatus: 'passed',
        qcRecord,
        qcPassedAt: new Date().toISOString(),
        qcInspector: inspector
      });
      await addActivity({
        orderId: selectedOrder.orderId,
        type: 'qc-pass',
        message: `QC PASSED by ${inspector}. Order moved to Ready to Ship.`,
        by: inspector
      });
      showPageToast(`✅ QC Passed — Order #${selectedOrder.orderId} is now Ready to Ship`, 'success', 6000);
    } else {
      await updateOrder(selectedOrderDbId, {
        status: 'qc-failed',
        qcRecord,
        qcFailedAt: new Date().toISOString(),
        qcInspector: inspector,
        qcFailReasons: failReasons
      });
      await addActivity({
        orderId: selectedOrder.orderId,
        type: 'qc-fail',
        message: `QC FAILED by ${inspector}. Reasons: ${failReasons.join(', ') || 'See notes'}. ${notes}`,
        by: inspector
      });

      if (document.getElementById('createReprintCheck').checked) {
        const reprintQty = parseInt(document.getElementById('reprintQtyInput').value) || 0;
        if (reprintQty > 0) {
          const reason = failReasons[0] || 'qc-fail';
          const reprintNotes = `QC Failed - ${failReasons.join(', ')}. ${notes}`;
          const recreatedOrder = await createReprintOrderFromSource(selectedOrder, {
            quantity: reprintQty,
            reasonLabel: reason,
            notes: reprintNotes,
            requestedBy: inspector,
          });
          await addReprint({
            parentOrderId: selectedOrder.orderId,
            linkedOrderId: recreatedOrder.orderId,
            reason,
            quantity: reprintQty,
            notes: reprintNotes,
            status: 'queued-in-dashboard',
            requestedBy: inspector
          });
          await addActivity({
            orderId: recreatedOrder.orderId,
            type: 'create',
            message: `Recreated from #${selectedOrder.orderId} after QC fail`,
            by: inspector
          });
        }
      }

      showPageToast(`❌ QC Failed — Order #${selectedOrder.orderId} returned to production queue`, 'error', 6000);
    }

    await Promise.all([loadRightPanel(), renderLeftPanel()]);
    clearQCForm();
  } catch (err) {
    console.error(err);
    showPageToast('Error submitting QC: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit QC Result';
  }
}

function clearQCForm() {
  selectedOrderDbId = null;
  selectedOrder = null;
  currentVerdict = null;
  checklistResults = {};
  document.getElementById('qcFormSection').style.display = 'none';
  document.getElementById('qcPlaceholder').style.display = 'flex';
  resetChecklistUI();
  renderLeftPanel();
}
</script>
</body>
</html>
