<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads — Bazaar Print</title>
  <script src="shared.js?v=20260429-PRI262"></script>
  <script src="pulse-config.local.js"></script>
  <script src="supabase-client.js?v=20260429-PRI262"></script>
  <script src="auth.js?v=20260429-PRI262"></script>
  <style id="page-styles"></style>
</head>
<body>
<div id="nav"></div>
<div id="breadcrumb"></div>

<!-- Header -->
<div class="leads-header">
  <div>
    <h2>📋 Leads</h2>
    <p>All inbound inquiries across every channel — walk-in, phone, email, Instagram, referrals.</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <input type="text" id="searchInput" placeholder="🔍 Search name, company..." oninput="renderLeads()" class="search-input">
    <select id="repFilter" onchange="renderLeads()" class="filter-select">
      <option value="">All Reps</option>
    </select>
    <select id="sourceFilter" onchange="renderLeads()" class="filter-select">
      <option value="">All Sources</option>
      <option value="walk_in">Walk-In</option>
      <option value="phone">Phone</option>
      <option value="email">Email</option>
      <option value="instagram">Instagram</option>
      <option value="website">Website</option>
      <option value="referral">Referral</option>
      <option value="repeat">Repeat Customer</option>
    </select>
    <button class="btn btn-primary" onclick="showNewLeadModal()">+ New Lead</button>
  </div>
</div>

<!-- No-orphan lead alert banner -->
<div id="orphanBanner" style="display:none;"></div>

<!-- Status pipeline tabs -->
<div class="status-tabs">
  <button class="stab active" data-status="all" onclick="setStatusFilter('all')">All</button>
  <button class="stab" data-status="new" onclick="setStatusFilter('new')">🆕 New</button>
  <button class="stab" data-status="qualifying" onclick="setStatusFilter('qualifying')">🔍 Qualifying</button>
  <button class="stab" data-status="qualified" onclick="setStatusFilter('qualified')">✅ Qualified</button>
  <button class="stab" data-status="routed" onclick="setStatusFilter('routed')">➡️ Routed to AM</button>
  <button class="stab" data-status="nurture" onclick="setStatusFilter('nurture')">🌱 Nurture</button>
  <button class="stab" data-status="lost" onclick="setStatusFilter('lost')">✗ Lost</button>
</div>

<!-- Score filter -->
<div style="display:flex;gap:6px;padding:8px 24px;border-bottom:1px solid var(--border);">
  <span style="font-size:12px;color:var(--text-muted);align-self:center;">Score:</span>
  <button class="score-btn active" data-score="all" onclick="setScoreFilter('all')">All</button>
  <button class="score-btn hot" data-score="hot" onclick="setScoreFilter('hot')">🔥 Hot</button>
  <button class="score-btn warm" data-score="warm" onclick="setScoreFilter('warm')">☀️ Warm</button>
  <button class="score-btn cool" data-score="cool" onclick="setScoreFilter('cool')">❄️ Cool</button>
</div>

<!-- Lead list -->
<div id="leadList" class="lead-list-container"></div>

<!-- ===== LEAD DETAIL SIDE PANEL ===== -->
<div id="leadPanel" class="lead-panel hidden">
  <div class="panel-header">
    <div>
      <h3 id="panelName" style="margin:0;font-size:17px;font-weight:700;"></h3>
      <span id="panelCompany" style="font-size:12px;color:var(--text-muted);"></span>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-sm btn-primary" onclick="showEditLeadModal()">Edit</button>
      <button class="btn btn-sm" onclick="closePanel()">✕</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<!-- ===== NEW/EDIT LEAD MODAL ===== -->
<div id="leadModal" class="modal-overlay hidden">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h3 id="leadModalTitle">New Lead</h3>
      <button class="btn btn-sm" onclick="closeModal('leadModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="field">
          <label>Name *</label>
          <input type="text" id="lf_name" placeholder="Contact name">
        </div>
        <div class="field">
          <label>Company</label>
          <input type="text" id="lf_company" placeholder="Company name">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="lf_email" placeholder="email@example.com">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="lf_phone" placeholder="(xxx) xxx-xxxx">
        </div>
        <div class="field">
          <label>Source *</label>
          <select id="lf_source">
            <option value="walk_in">Walk-In</option>
            <option value="phone">Phone</option>
            <option value="email">Email</option>
            <option value="instagram">Instagram</option>
            <option value="website">Website</option>
            <option value="referral">Referral</option>
            <option value="repeat">Repeat Customer</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field">
          <label>Source Detail</label>
          <input type="text" id="lf_sourceDetail" placeholder="e.g. IG @handle, walk-in 4/29">
        </div>
        <div class="field">
          <label>Product Type</label>
          <input type="text" id="lf_productType" placeholder="e.g. Roll Labels, Folding Cartons">
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="text" id="lf_quantity" placeholder="e.g. 1000 units">
        </div>
      </div>
      <div class="field">
        <label>Specs / Notes</label>
        <textarea id="lf_specs" rows="2" placeholder="Size, substrate, special requirements..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div class="field">
          <label>Score</label>
          <select id="lf_score">
            <option value="hot">🔥 Hot</option>
            <option value="warm" selected>☀️ Warm</option>
            <option value="cool">❄️ Cool</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="lf_status">
            <option value="new">🆕 New</option>
            <option value="qualifying">🔍 Qualifying</option>
            <option value="qualified">✅ Qualified</option>
            <option value="routed">➡️ Routed to AM</option>
            <option value="nurture">🌱 Nurture</option>
            <option value="lost">✗ Lost</option>
          </select>
        </div>
        <div class="field">
          <label>Urgency</label>
          <input type="text" id="lf_urgency" placeholder="e.g. Rush — needs by 5/5">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="field">
          <label>Artwork Status</label>
          <select id="lf_artworkStatus">
            <option value="">Unknown</option>
            <option value="has artwork">Has Artwork</option>
            <option value="needs design">Needs Design</option>
            <option value="uploading">Uploading</option>
          </select>
        </div>
        <div class="field">
          <label>Next Action Date</label>
          <input type="date" id="lf_nextActionDate">
        </div>
      </div>
      <div class="field">
        <label>Next Action</label>
        <input type="text" id="lf_nextAction" placeholder="e.g. Send quote by EOD, Follow up Thursday">
      </div>
      <div class="field">
        <label>Rep Notes</label>
        <textarea id="lf_repNotes" rows="2" placeholder="Internal notes — not visible to customer"></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn" onclick="closeModal('leadModal')">Cancel</button>
        <button class="btn btn-primary" id="leadSaveBtn" onclick="saveLead()">Save Lead</button>
      </div>
    </div>
  </div>
</div>

<!-- Convert to Deal Modal -->
<div id="convertModal" class="modal-overlay hidden">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header">
      <h3>Convert Lead to Deal</h3>
      <button class="btn btn-sm" onclick="closeModal('convertModal')">✕</button>
    </div>
    <div class="modal-body">
      <!-- Phase 3 Gate 1 warning -->
      <div id="cv_gate_warning" style="display:none;background:#fff5f5;border:1px solid #fca5a5;border-radius:6px;padding:10px 12px;margin-bottom:14px;color:#b91c1c;font-size:13px;"></div>

      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Creating a Deal for this lead. The lead will be marked as "Routed" and linked to the new deal.</p>
      <div class="field">
        <label>Quoted Price</label>
        <input type="number" id="cv_price" placeholder="0.00" step="0.01">
      </div>
      <div class="field">
        <label>Follow-Up Date * (required)</label>
        <input type="date" id="cv_followUpDate">
      </div>
      <div class="field">
        <label>Internal Notes</label>
        <textarea id="cv_notes" rows="2" placeholder="Notes for the deal..."></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn" onclick="closeModal('convertModal')">Cancel</button>
        <button class="btn btn-primary" id="cv_convert_btn" onclick="confirmConvert()">Convert to Deal</button>
      </div>
    </div>
  </div>
</div>

// ── State ──────────────────────────────────────────────────
let leads = [];
let currentLeadId = null;
let editingLeadId = null;
let statusFilter = 'all';
let scoreFilter = 'all';
let currentUser = null;

// ── Init ───────────────────────────────────────────────────
async function onAuthReady(user) {
  currentUser = user;
  await loadLeads();
  renderLeads();
  populateRepFilter();
}

if (typeof window !== 'undefined') {
  window.__pulseAuthCallback = onAuthReady;
}

async function loadLeads() {
  try {
    const sb = getSupabaseClient();
    if (!sb) { leads = getDemoLeads(); return; }

    const { data, error } = await sb
      .from('leads')
      .select('*, profiles!leads_assigned_rep_fkey(id, display_name)')
      .order('created_at', { ascending: false });

    if (error) throw error;
    leads = data || [];
  } catch(e) {
    console.warn('loadLeads:', e);
    leads = getDemoLeads();
  }
}

function populateRepFilter() {
  // Will be populated from profiles when Supabase connected

// ── Filters ────────────────────────────────────────────────
function setStatusFilter(status) {
  statusFilter = status;
  document.querySelectorAll('.stab').forEach(b => b.classList.toggle('active', b.dataset.status === status));
  renderLeads();
}

function setScoreFilter(score) {
  scoreFilter = score;
  document.querySelectorAll('.score-btn').forEach(b => b.classList.toggle('active', b.dataset.score === score));
  renderLeads();
}

function getFiltered() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const rep = document.getElementById('repFilter')?.value || '';
  const source = document.getElementById('sourceFilter')?.value || '';
  return leads.filter(l => {
    if (statusFilter !== 'all' && l.status !== statusFilter) return false;
    if (scoreFilter !== 'all' && l.score !== scoreFilter) return false;
    if (rep && l.assigned_rep !== rep) return false;
    if (source && l.source !== source) return false;
    if (q) {
      const t = (l.name + ' ' + l.company + ' ' + l.email + ' ' + l.product_type).toLowerCase();
      if (!t.includes(q)) return false;
    }
    return true;
  });
}

// ── Orphan Banner ──────────────────────────────────────────
// Rule: "no-orphan lead" — leads in 'new' with no follow-up date set,
// OR any lead whose next_action_date is overdue by >0 days.
function renderOrphanBanner() {
  const today = new Date().toISOString().split('T')[0];
  const active = leads.filter(l => !['lost','routed'].includes(l.status));

  // Uncontacted new leads (no follow-up date at all)
  const uncontacted = active.filter(l => l.status === 'new' && !l.next_action_date);

  // Hot/warm leads overdue for follow-up
  const overdueHot = active.filter(l =>
    ['hot','warm'].includes(l.score) &&
    l.next_action_date && l.next_action_date < today &&
    !['lost','routed','nurture'].includes(l.status)
  );

  const banner = document.getElementById('orphanBanner');
  if (!banner) return;

  const parts = [];
  if (uncontacted.length) {
    parts.push(`
      <div class="orphan-item orphan-critical">
        <span class="orphan-icon">🚨</span>
        <span><strong>${uncontacted.length} new lead${uncontacted.length > 1 ? 's' : ''} with no follow-up scheduled</strong> — assign a rep and set a follow-up date
          <button class="orphan-btn" onclick="setStatusFilter('new')">View New Leads</button>
        </span>
      </div>`);
  }
  if (overdueHot.length) {
    parts.push(`
      <div class="orphan-item orphan-warn">
        <span class="orphan-icon">⚠️</span>
        <span><strong>${overdueHot.length} hot/warm lead${overdueHot.length > 1 ? 's' : ''} overdue for follow-up</strong> — check the overdue items below
          <button class="orphan-btn" onclick="setScoreFilter('hot')">View Hot Leads</button>
        </span>
      </div>`);
  }

  if (parts.length) {
    banner.style.display = 'block';
    banner.innerHTML = `<div class="orphan-banner">${parts.join('')}</div>`;
  } else {
    banner.style.display = 'none';
    banner.innerHTML = '';
  }
}

// ── Render ─────────────────────────────────────────────────
function renderLeads() {
  renderOrphanBanner();
  const filtered = getFiltered();
  const container = document.getElementById('leadList');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>No leads found</h3><p>Try adjusting your filters or add a new lead.</p></div>`;
    return;
  }
  container.innerHTML = filtered.map(l => renderLeadCard(l)).join('');
}

function renderLeadCard(l) {
  const today = new Date().toISOString().split('T')[0];
  let nextActionHtml = '';
  if (l.next_action_date) {
    const overdue = l.next_action_date < today;
    nextActionHtml = overdue
      ? `<span class="overdue-chip">⚠️ Overdue: ${escHtml(l.next_action || 'Follow up')}</span>`
      : `<span class="next-action-chip">📅 ${escHtml(l.next_action || 'Follow up')} by ${l.next_action_date}</span>`;
  }

  return `
    <div class="lead-card" onclick="openLead('${l.id}')">
      <div class="lead-score-dot score-${l.score}"></div>
      <div class="lead-card-main">
        <div class="lead-name">${escHtml(l.name)}${l.company ? ` <span style="font-weight:400;color:var(--text-muted);">— ${escHtml(l.company)}</span>` : ''}</div>
        <div class="lead-sub">
          <span class="source-tag">${sourceLabel(l.source)}</span>
          ${l.product_type ? `<span>📦 ${escHtml(l.product_type)}${l.quantity ? ' × ' + escHtml(l.quantity) : ''}</span>` : ''}
          ${l.urgency ? `<span style="color:#c2410c;">⚡ ${escHtml(l.urgency)}</span>` : ''}
          ${nextActionHtml}
        </div>
      </div>
      <div class="lead-card-right">
        <span class="status-pip pip-${l.status}">${statusLabel(l.status)}</span>
        <span style="font-size:10px;color:var(--text-muted);">${timeAgo(l.created_at)}</span>
      </div>
    </div>`;
}

function sourceLabel(s) {
  const map = { walk_in: 'Walk-In', phone: 'Phone', email: 'Email', instagram: 'Instagram', website: 'Website', referral: 'Referral', repeat: 'Repeat', other: 'Other' };
  return map[s] || s;
}

function statusLabel(s) {
  const map = { new: '🆕 New', qualifying: '🔍 Qualifying', qualified: '✅ Qualified', routed: '➡️ Routed', nurture: '🌱 Nurture', lost: '✗ Lost' };
  return map[s] || s;
}

// ── Lead Panel ──────────────────────────────────────────────
function openLead(id) {
  currentLeadId = id;
  const l = leads.find(x => x.id === id);
  if (!l) return;

  document.getElementById('panelName').textContent = l.name;
  document.getElementById('panelCompany').textContent = l.company || '';

  const today = new Date().toISOString().split('T')[0];
  const overdueNext = l.next_action_date && l.next_action_date < today;

  document.getElementById('panelBody').innerHTML = `
    <!-- Status pipeline -->
    <div class="detail-section">
      <h4>Pipeline Stage</h4>
      <div class="status-change-row">
        ${['new','qualifying','qualified','routed','nurture','lost'].map(s => `
          <button class="status-change-btn ${l.status === s ? 'current' : ''}" onclick="updateLeadStatus('${l.id}','${s}')">${statusLabel(s)}</button>
        `).join('')}
      </div>
    </div>

    <!-- Score -->
    <div class="detail-section">
      <h4>Score</h4>
      <div style="display:flex;gap:6px;">
        ${['hot','warm','cool'].map(sc => `
          <button class="status-change-btn ${l.score === sc ? 'current' : ''}" onclick="updateLeadScore('${l.id}','${sc}')">${sc === 'hot' ? '🔥' : sc === 'warm' ? '☀️' : '❄️'} ${sc.charAt(0).toUpperCase()+sc.slice(1)}</button>
        `).join('')}
      </div>
    </div>

    <!-- Contact info -->
    <div class="detail-section">
      <h4>Contact</h4>
      ${l.email ? `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-val"><a href="mailto:${escHtml(l.email)}">${escHtml(l.email)}</a></span></div>` : ''}
      ${l.phone ? `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-val"><a href="tel:${escHtml(l.phone)}">${escHtml(l.phone)}</a></span></div>` : ''}
      <div class="detail-row"><span class="detail-label">Source</span><span class="detail-val">${sourceLabel(l.source)}${l.source_detail ? ' — ' + escHtml(l.source_detail) : ''}</span></div>
    </div>

    <!-- Product interest -->
    <div class="detail-section">
      <h4>Product Interest</h4>
      ${l.product_type ? `<div class="detail-row"><span class="detail-label">Product</span><span class="detail-val">${escHtml(l.product_type)}</span></div>` : ''}
      ${l.quantity ? `<div class="detail-row"><span class="detail-label">Quantity</span><span class="detail-val">${escHtml(l.quantity)}</span></div>` : ''}
      ${l.specs ? `<div class="detail-row"><span class="detail-label">Specs</span><span class="detail-val">${escHtml(l.specs)}</span></div>` : ''}
      ${l.urgency ? `<div class="detail-row"><span class="detail-label">Urgency</span><span class="detail-val" style="color:#c2410c;">${escHtml(l.urgency)}</span></div>` : ''}
      ${l.artwork_status ? `<div class="detail-row"><span class="detail-label">Artwork</span><span class="detail-val">${escHtml(l.artwork_status)}</span></div>` : ''}
    </div>

    <!-- Next action -->
    <div class="detail-section">
      <h4>Next Action</h4>
      ${l.next_action ? `<div class="detail-row"><span class="detail-label">Action</span><span class="detail-val ${overdueNext ? 'overdue-chip' : ''}">${overdueNext ? '⚠️ OVERDUE: ' : ''}${escHtml(l.next_action)}</span></div>` : ''}
      ${l.next_action_date ? `<div class="detail-row"><span class="detail-label">Date</span><span class="detail-val">${l.next_action_date}</span></div>` : ''}
    </div>

    <!-- Rep notes -->
    ${l.rep_notes ? `
    <div class="detail-section">
      <h4>Rep Notes</h4>
      <p style="font-size:13px;color:var(--text);line-height:1.5;">${escHtml(l.rep_notes)}</p>
    </div>` : ''}

    <!-- Actions -->
    <div class="detail-section">
      <h4>Actions</h4>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-sm btn-primary" onclick="showConvertModal('${l.id}')">⇒ Convert to Deal</button>
        ${l.email ? `<a href="mailto:${escHtml(l.email)}" class="btn btn-sm">📧 Email</a>` : ''}
        ${l.phone ? `<a href="tel:${escHtml(l.phone)}" class="btn btn-sm">📞 Call</a>` : ''}
      </div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);padding-top:4px;">Lead created ${timeAgo(l.created_at)}</div>`;

  document.getElementById('leadPanel').classList.remove('hidden');
}

function closePanel() {
  document.getElementById('leadPanel').classList.add('hidden');
  currentLeadId = null;
}

async function updateLeadStatus(id, newStatus) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;
  const old = lead.status;
  lead.status = newStatus;
  try {
    const sb = getSupabaseClient();
    if (sb && !id.startsWith('demo')) {
      await sb.from('leads').update({ status: newStatus }).eq('id', id);
    }
  } catch(e) { lead.status = old; }
  renderLeads();
  openLead(id);
  showPageToast(`Lead moved to ${statusLabel(newStatus)}.`, 'success');
}

async function updateLeadScore(id, newScore) {
  const lead = leads.find(l => l.id === id);
  if (!lead) return;
  lead.score = newScore;
  try {
    const sb = getSupabaseClient();
    if (sb && !id.startsWith('demo')) {
      await sb.from('leads').update({ score: newScore }).eq('id', id);
    }
  } catch(e) {}
  renderLeads();
  openLead(id);
}

// ── New/Edit Lead Modal ─────────────────────────────────────
function showNewLeadModal() {
  editingLeadId = null;
  document.getElementById('leadModalTitle').textContent = 'New Lead';
  clearLeadForm();
  // Set default next action date to tomorrow
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  document.getElementById('lf_nextActionDate').value = tomorrow;
  showModal('leadModal');
}

function showEditLeadModal() {
  if (!currentLeadId) return;
  const l = leads.find(x => x.id === currentLeadId);
  if (!l) return;
  editingLeadId = currentLeadId;
  document.getElementById('leadModalTitle').textContent = 'Edit Lead';
  document.getElementById('lf_name').value = l.name || '';
  document.getElementById('lf_company').value = l.company || '';
  document.getElementById('lf_email').value = l.email || '';
  document.getElementById('lf_phone').value = l.phone || '';
  document.getElementById('lf_source').value = l.source || 'other';
  document.getElementById('lf_sourceDetail').value = l.source_detail || '';
  document.getElementById('lf_productType').value = l.product_type || '';
  document.getElementById('lf_quantity').value = l.quantity || '';
  document.getElementById('lf_specs').value = l.specs || '';
  document.getElementById('lf_score').value = l.score || 'warm';
  document.getElementById('lf_status').value = l.status || 'new';
  document.getElementById('lf_urgency').value = l.urgency || '';
  document.getElementById('lf_artworkStatus').value = l.artwork_status || '';
  document.getElementById('lf_nextActionDate').value = l.next_action_date || '';
  document.getElementById('lf_nextAction').value = l.next_action || '';
  document.getElementById('lf_repNotes').value = l.rep_notes || '';
  showModal('leadModal');
}

function clearLeadForm() {
  ['lf_name','lf_company','lf_email','lf_phone','lf_sourceDetail','lf_productType','lf_quantity','lf_specs','lf_urgency','lf_nextAction','lf_repNotes','lf_nextActionDate'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('lf_source').value = 'walk_in';
  document.getElementById('lf_score').value = 'warm';
  document.getElementById('lf_status').value = 'new';
  document.getElementById('lf_artworkStatus').value = '';
}

async function saveLead() {
  const name = document.getElementById('lf_name').value.trim();
  if (!name) { showPageToast('Name is required.', 'error'); return; }

  const payload = {
    name,
    company: document.getElementById('lf_company').value.trim(),
    email: document.getElementById('lf_email').value.trim(),
    phone: document.getElementById('lf_phone').value.trim(),
    source: document.getElementById('lf_source').value,
    source_detail: document.getElementById('lf_sourceDetail').value.trim(),
    product_type: document.getElementById('lf_productType').value.trim(),
    quantity: document.getElementById('lf_quantity').value.trim(),
    specs: document.getElementById('lf_specs').value.trim(),
    score: document.getElementById('lf_score').value,
    status: document.getElementById('lf_status').value,
    urgency: document.getElementById('lf_urgency').value.trim(),
    artwork_status: document.getElementById('lf_artworkStatus').value,
    next_action_date: document.getElementById('lf_nextActionDate').value || null,
    next_action: document.getElementById('lf_nextAction').value.trim(),
    rep_notes: document.getElementById('lf_repNotes').value.trim(),
  };

  try {
    document.getElementById('leadSaveBtn').disabled = true;
    const sb = getSupabaseClient();

    if (editingLeadId) {
      // Update
      const lead = leads.find(l => l.id === editingLeadId);
      if (lead) Object.assign(lead, payload);
      if (sb && !editingLeadId.startsWith('demo')) {
        await sb.from('leads').update(payload).eq('id', editingLeadId);
      }
      closeModal('leadModal');
      renderLeads();
      if (currentLeadId === editingLeadId) openLead(editingLeadId);
      showPageToast('Lead updated.', 'success');
    } else {
      // Create
      if (sb) {
        const { data, error } = await sb.from('leads').insert({
          ...payload,
          created_by: currentUser?.id || null,
        }).select().single();
        if (error) throw error;
        leads.unshift(data);
      } else {
        const demo = { id: 'demo-' + Date.now(), ...payload, created_at: new Date().toISOString() };
        leads.unshift(demo);
      }
      closeModal('leadModal');
      renderLeads();
      showPageToast('Lead added.', 'success');
    }
  } catch(e) {
    showPageToast('Error saving lead: ' + e.message, 'error');
  } finally {
    document.getElementById('leadSaveBtn').disabled = false;
  }
}

// ── Phase 3: Gate 1 — Lead → Deal qualification check ──────
function checkLeadGate1(lead) {
  const missing = [];
  if (!lead.product_type) missing.push('Product type not specified');
  if (!lead.quantity) missing.push('Quantity not specified');
  if (!lead.artwork_status) missing.push('Artwork status not set (have / coming / need design)');
  if (!lead.source) missing.push('Source channel not recorded');
  if (!lead.phone && !lead.email) missing.push('Contact info missing (phone or email required)');
  if (!lead.next_action) missing.push('Next action not set');
  if (!lead.next_action_date) missing.push('Next action date not set');
  if (!['qualified','routed'].includes(lead.status)) missing.push('Lead must be Qualified before converting to Deal');
  return missing;
}

// ── Convert to Deal ─────────────────────────────────────────
let convertLeadId = null;

function showConvertModal(leadId) {
  convertLeadId = leadId;
  const lead = leads.find(l => l.id === leadId);

  // Phase 3 Gate 1 — show any missing required fields before allowing conversion
  const gateWarningEl = document.getElementById('cv_gate_warning');
  if (lead) {
    const missing = checkLeadGate1(lead);
    if (missing.length) {
      gateWarningEl.style.display = 'block';
      gateWarningEl.innerHTML = `<strong>⛔ Gate 1 — Qualification packet incomplete</strong>
        <p style="margin:6px 0 4px;font-size:12px;">Fix these before converting to a Deal:</p>
        <ul style="margin:0 0 0 16px;font-size:12px;">${missing.map(m => `<li>${m}</li>`).join('')}</ul>`;
      document.getElementById('cv_convert_btn').disabled = true;
    } else {
      gateWarningEl.style.display = 'none';
      document.getElementById('cv_convert_btn').disabled = false;
    }
  }

  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  document.getElementById('cv_followUpDate').value = tomorrow;
  document.getElementById('cv_price').value = '';
  document.getElementById('cv_notes').value = '';
  showModal('convertModal');
}

async function confirmConvert() {
  const followUpDate = document.getElementById('cv_followUpDate').value;
  if (!followUpDate) { showPageToast('Follow-up date is required.', 'error'); return; }

  // Re-check gate before committing
  const lead = leads.find(l => l.id === convertLeadId);
  if (lead) {
    const missing = checkLeadGate1(lead);
    if (missing.length) {
      showPageToast('Complete the qualification packet before converting.', 'error');
      return;
    }
  }

  const lead = leads.find(l => l.id === convertLeadId);
  if (!lead) return;

  try {
    const sb = getSupabaseClient();
    if (sb && !convertLeadId.startsWith('demo')) {
      const { data: deal, error } = await sb.from('deals').insert({
        customer_name: lead.name,
        customer_email: lead.email,
        customer_phone: lead.phone,
        company: lead.company,
        product_type: lead.product_type,
        specs: lead.specs,
        artwork_status: lead.artwork_status,
        quoted_price: parseFloat(document.getElementById('cv_price').value) || null,
        follow_up_date: followUpDate,
        internal_notes: document.getElementById('cv_notes').value.trim(),
        lead_id: convertLeadId,
        status: 'draft',
        created_by: currentUser?.id || null,
      }).select().single();
      if (error) throw error;

      await sb.from('leads').update({ status: 'routed', deal_id: deal.id }).eq('id', convertLeadId);
      lead.status = 'routed';
    } else {
      lead.status = 'routed';
    }

    closeModal('convertModal');
    closePanel();
    renderLeads();
    showPageToast('✅ Lead converted to Deal. Find it in Quotes.', 'success');
  } catch(e) {
    showPageToast('Error converting lead: ' + e.message, 'error');
  }
}

// ── Modal/utility helpers ───────────────────────────────────
function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); });
});

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 2) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

// Fallback for no-Supabase load
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    if (!leads.length) {
      leads = getDemoLeads();
      renderLeads();
    }
  }, 2000);
});
</script>
