name: Deploy — pulse production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Release reason / ticket reference (required)"
        required: true
      staging_verified:
        description: "Staging was verified before this deploy (yes/no)"
        required: true
        default: "yes"

# Production deploys are always manual (workflow_dispatch only).
# No auto-deploy on push to main — human approval is required.

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an in-flight production deploy

jobs:
  preflight:
    name: Preflight — staging smoke check
    runs-on: ubuntu-latest
    steps:
      - name: Confirm staging was verified
        run: |
          if [ "${{ github.event.inputs.staging_verified }}" != "yes" ]; then
            echo "❌ staging_verified must be 'yes'. Verify staging before deploying to production."
            exit 1
          fi
          echo "✅ Preflight passed: staging verified"

  deploy:
    name: Deploy to pulse.bazaar-admin.com
    runs-on: ubuntu-latest
    needs: preflight
    environment:
      name: production
      url: https://pulse.bazaar-admin.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build — inject production config
        env:
          PULSE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PULSE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          PULSE_STORAGE_BACKEND: supabase
          PULSE_ENV: production
        run: bash deploy/build.sh

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pulse
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Run smoke tests against production
        env:
          SMOKE_BASE_URL: https://pulse.bazaar-admin.com
        run: bash deploy/smoke-test.sh

      - name: Tag release
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          TAG="release/${DATE}-${SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Production deploy: ${{ github.event.inputs.reason }}"
          git push origin "$TAG"
          echo "Tagged release: $TAG"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Production deploy complete: https://pulse.bazaar-admin.com"
          echo "Build: $(git rev-parse --short HEAD)"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Rollback hint on failure
        if: failure()
        run: |
          echo "❌ Production deploy FAILED."
          echo "To rollback to the previous deployment:"
          echo "  1. Go to Cloudflare Pages → pulse-production → Deployments"
          echo "  2. Click the previous successful deployment → '...' → Rollback"
          echo "  OR run: bash deploy/rollback.sh"
