<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Pulse Local Data</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; background:#f8fafc; color:#0f172a; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border:1px solid #dbe3ee; border-radius:16px; padding:28px; width:min(560px, calc(100vw - 32px)); box-shadow:0 16px 40px rgba(15,23,42,.08); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0 0 14px; line-height:1.5; color:#475569; }
    .status { margin-top:16px; padding:14px; border-radius:12px; background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .ok { background:#ecfdf5; color:#166534; border-color:#86efac; }
    .err { background:#fef2f2; color:#991b1b; border-color:#fca5a5; }
    .actions { display:flex; gap:12px; margin-top:18px; }
    .btn { border:none; border-radius:10px; padding:12px 16px; font-size:14px; font-weight:700; cursor:pointer; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-secondary { background:#e2e8f0; color:#0f172a; }
    code { background:#f1f5f9; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset local Pulse orders</h1>
    <p>This clears the local Pulse <code>orders</code> and <code>purchase_orders</code> stores in your browser and keeps demo reseeding off so the dashboard stays blank for testing.</p>
    <div id="status" class="status">Opening this page will automatically wipe the local test data.</div>
    <div class="actions">
      <button class="btn btn-primary" onclick="resetPulseData()">Reset local Pulse data</button>
      <button class="btn btn-secondary" onclick="location.href='dashboard.html'">Go to dashboard</button>
    </div>
  </div>

  <script>
    const DB_NAME = 'BazaarPrintDB';
    const DB_VERSION = 4;

    function setStatus(message, cls='') {
      const el = document.getElementById('status');
      el.className = 'status' + (cls ? ' ' + cls : '');
      el.innerHTML = message;
    }

    let resetStarted = false;

    async function resetPulseData() {
      if (resetStarted) return;
      resetStarted = true;
      setStatus('Clearing local Pulse data...');
      localStorage.setItem('pulse_seed_demo', '0');

      try {
        const db = await new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onerror = () => reject(req.error || new Error('Could not open Pulse database'));
          req.onsuccess = () => resolve(req.result);
        });

        await new Promise((resolve, reject) => {
          const tx = db.transaction(['orders', 'purchase_orders'], 'readwrite');
          tx.objectStore('orders').clear();
          tx.objectStore('purchase_orders').clear();
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error || new Error('Could not clear Pulse stores'));
          tx.onabort = () => reject(tx.error || new Error('Pulse reset aborted'));
        });

        db.close();
        setStatus('Done. Local Pulse orders are cleared and demo reseeding is disabled. Redirecting to dashboard...', 'ok');
        setTimeout(() => { location.href = 'dashboard.html?fresh=1'; }, 900);
      } catch (error) {
        console.error(error);
        setStatus('Reset failed: ' + (error?.message || error), 'err');
      }
    }

    window.addEventListener('load', () => {
      setTimeout(resetPulseData, 150);
    });
  </script>
</body>
</html>
